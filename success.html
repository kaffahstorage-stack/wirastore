<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Success</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 35px;
      border-radius: 18px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .icon {
      width: 85px;
      height: 85px;
      margin: 0 auto 15px;
      background: #22c55e;
      color: white;
      font-size: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: bounce 0.7s ease;
    }

    @keyframes bounce {
      0% { transform: scale(0); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    h1 {
      margin: 10px 0;
      font-size: 22px;
      color: #111827;
    }

    p {
      font-size: 14px;
      color: #6b7280;
    }

    .box {
      background: #f3f4f6;
      padding: 12px;
      border-radius: 10px;
      margin: 15px 0;
      font-size: 13px;
      color: #374151;
      text-align: left;
    }

    .status {
      font-weight: bold;
    }

    .paid { color: #16a34a; }
    .pending { color: #f59e0b; }
    .failed { color: #ef4444; }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 15px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      background: #2563eb;
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .loading {
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="icon">✓</div>

  <h1 id="title">Memeriksa pembayaran...</h1>
  <p id="desc" class="loading">Mohon tunggu sebentar</p>

  <div class="box" id="infoBox" style="display:none;">
    <div>Order ID: <b id="orderIdText">-</b></div>
    <div>Status: <span id="statusText" class="status">-</span></div>
  </div>

  <a href="/" class="btn">🏠 Kembali ke Beranda</a>

</div>

<script>
  // ambil order_id dari URL
  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get("order_id");

  document.getElementById("orderIdText").innerText = orderId;
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

  // 🔥 GANTI INI DENGAN FIREBASE KAMU
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBZRIOdEwOm75TIugHpT7GdSb8Z9J6bvYc",
  authDomain: "marketplacewira.firebaseapp.com",
  databaseURL: "https://marketplacewira-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "marketplacewira",
  storageBucket: "marketplacewira.firebasestorage.app",
  messagingSenderId: "171596139414",
  appId: "1:171596139414:web:7bad80d23a4efe39612bb7",
  measurementId: "G-4NDN1VKS78"
};
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);



  const title = document.getElementById("title");
  const desc = document.getElementById("desc");
  const statusText = document.getElementById("statusText");
  const infoBox = document.getElementById("infoBox");

  async function checkOrder() {
    if (!orderId) {
      title.innerText = "Order tidak ditemukan";
      desc.innerText = "Link tidak valid";
      return;
    }

    const docRef = doc(db, "orders", orderId);
    const docSnap = await getDoc(docRef);

    infoBox.style.display = "block";

    if (docSnap.exists()) {
      const data = docSnap.data();

      if (data.status === "paid") {
        title.innerText = "🎉 Pembayaran Berhasil!";
        desc.innerText = "Pesanan kamu sedang diproses";

        statusText.innerText = "PAID";
        statusText.classList.add("paid");
      }

      else if (data.status === "pending") {
        title.innerText = "⏳ Menunggu Pembayaran";
        desc.innerText = "Silakan selesaikan pembayaran kamu";

        statusText.innerText = "PENDING";
        statusText.classList.add("pending");
      }

      else {
        title.innerText = "❌ Pembayaran Gagal";
        desc.innerText = "Silakan coba lagi";

        statusText.innerText = "FAILED";
        statusText.classList.add("failed");
      }

    } else {
      title.innerText = "Order tidak ditemukan";
      desc.innerText = "Data tidak ada di database";
    }
  }

  checkOrder();
</script>

</body>
</html>
